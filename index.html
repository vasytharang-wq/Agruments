<html>

<head>
    <title>Objects in Jv</title>
</head>

<body>
    <h2>JavaScript Objects and its Properties</h2>

    <p>There are two differnt ways to access an object property</p>

    <p>You can use .property or ["property"].</p>
    <p id="demo"></p>
     <script>
     //Create an object:
    var person  = {
        firstName : "I", 
        age : 20,
        //these are called pairs
    };

    //Display some data from the object:
    document.getElementById('demo').innerHTML = person["firstName"] + " am " + person.age + "years old";
     </script>
</body>

</html>
